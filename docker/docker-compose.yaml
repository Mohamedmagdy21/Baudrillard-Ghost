services:
 mongodb:
  image: mongo:noble
  container_name: mongodb
  ports:
   - "27007:27017"
  volumes:
   - mongodata:/data/db

  environment:
   - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
   - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

  networks:
   - backend  

  restart: always 


 qdrant:
   image: qdrant/qdrant
   container_name: qdrant

   ports:
    - 6333:6333
    - 6334:6334

   volumes:
    - qdrant_storage:/qdrant/storage


   networks:
    - backend 

   restart: always  

networks:
  backend:  

volumes:   
  mongodata:
  qdrant_storage:








